{% extends "Base.html" %}

{% block title %}Admin / Workers - MediaVortex{% endblock %}

{% block content %}
<div class="container-fluid mt-3">
  {% include "_admin_subnav.html" %}
  <h2 class="h4 mb-3"><i class="fas fa-server me-2"></i>Workers</h2>
  <div id="StaleNote" class="small text-muted mb-2"></div>
  <div id="WorkersGrid" class="row g-3"></div>
</div>

<style>
.diverge-border { border: 2px solid #f0ad4e !important; }
.hung-border { border: 2px solid #d9534f !important; }
</style>

<script>
// directive: worker-runtime-state | see admin-workers.C3
const INTENT_BADGE = {
  'Online':   { cls: 'bg-success', label: 'Online' },
  'Paused':   { cls: 'bg-warning text-dark', label: 'Paused' },
  'Draining': { cls: 'bg-warning text-dark', label: 'Draining' },
  'Stopped':  { cls: 'bg-secondary', label: 'Stopped' },
};

// directive: worker-runtime-state | see admin-workers.C3
const TRUTH_BADGE = {
  'Initializing': { cls: 'bg-light text-dark border', label: 'Initializing' },
  'Idle':         { cls: 'bg-light text-dark border', label: 'Idle' },
  'ClaimingJob':  { cls: 'bg-info text-dark', label: 'ClaimingJob' },
  'Encoding':     { cls: 'bg-primary', label: 'Encoding' },
  'Scanning':     { cls: 'bg-info text-dark', label: 'Scanning' },
  'Draining':     { cls: 'bg-warning text-dark', label: 'Draining' },
  'Paused':       { cls: 'bg-secondary', label: 'Paused' },
};

function IntentBadgeHtml(Status) {
  const Cfg = INTENT_BADGE[Status] || { cls: 'bg-secondary', label: Status || 'Unknown' };
  return `<span class="badge ${Cfg.cls}" title="Operator intent">${Cfg.label}</span>`;
}

function TruthBadgeHtml(RuntimeState) {
  if (!RuntimeState) {
    return `<span class="badge bg-secondary" title="Worker has not reported runtime state">no truth</span>`;
  }
  if (typeof RuntimeState === 'string' && RuntimeState.startsWith('Faulted')) {
    return `<span class="badge bg-danger" title="Worker fault">${RuntimeState}</span>`;
  }
  const Cfg = TRUTH_BADGE[RuntimeState] || { cls: 'bg-secondary', label: RuntimeState };
  return `<span class="badge ${Cfg.cls}" title="Worker reports">${Cfg.label}</span>`;
}

function ConnectivityDotHtml(HeartbeatAgeSec, StaleSec) {
  if (HeartbeatAgeSec === null || HeartbeatAgeSec === undefined) {
    return `<span class="badge bg-secondary" title="No heartbeat yet">&#9679;</span>`;
  }
  const cls = HeartbeatAgeSec <= StaleSec ? 'bg-success' : 'bg-danger';
  const title = `Heartbeat ${HeartbeatAgeSec}s ago (stale > ${StaleSec}s)`;
  return `<span class="badge ${cls}" title="${title}">&#9679;</span>`;
}

function RenderTile(W, StaleSec, DivergenceSec) {
  const Name = W.WorkerName;
  const HbAge = W.HeartbeatAgeSec != null ? W.HeartbeatAgeSec : W.heartbeatagesec;
  const RsAge = W.RuntimeStateAgeSec != null ? W.RuntimeStateAgeSec : W.runtimestateagesec;
  const Intent = IntentBadgeHtml(W.Status);
  const Truth = TruthBadgeHtml(W.RuntimeState);
  const Dot = ConnectivityDotHtml(HbAge, StaleSec);
  const Mount = W.MountValidationError
    ? `<div class="small text-danger mt-1">Mount error: ${W.MountValidationError}</div>`
    : '';
  const NvencBadge = W.NvencCapable ? '<span class="badge bg-info text-dark ms-1">NVENC</span>' : '';
  const CapToggle = (Cap, Label, Enabled) => `
    <label class="form-check form-check-inline form-check-reverse mb-0" style="font-size:0.78em;">
      <input type="checkbox" class="form-check-input cap-toggle" data-worker="${Name}" data-cap="${Cap}" ${Enabled ? 'checked' : ''}>
      <span class="form-check-label">${Label}</span>
    </label>`;
  const CapsRow = `
    <div class="d-flex flex-wrap align-items-center gap-1 mt-2">
      ${CapToggle('TranscodeEnabled', 'Transcode', W.TranscodeEnabled)}
      ${CapToggle('RemuxEnabled', 'Remux', W.RemuxEnabled)}
      ${CapToggle('QualityTestEnabled', 'Quality', W.QualityTestEnabled)}
      ${CapToggle('ScanEnabled', 'Scan', W.ScanEnabled)}
      ${NvencBadge}
    </div>`;
  const Ver = (W.Version || 'unknown').toString().substring(0, 8);
  const Diverge = W.IntentDiverges === true;
  const Hung = W.IsHung === true;
  const Border = Hung ? 'hung-border' : (Diverge ? 'diverge-border' : '');
  const DivergeTip = Hung
    ? `title="Encoding AttemptId ${W.CurrentAttemptId || '?'} for ${Math.round((RsAge || 0)/60)} min without progress -- auto-reset pending."`
    : (Diverge
      ? `title="Operator intent: ${W.Status || '?'}; worker reports: ${W.RuntimeState || 'no truth'}. Worker may be stuck or unable to honor the intent (> ${DivergenceSec}s)."`
      : '');
  const AttemptLine = (W.CurrentAttemptId !== null && W.CurrentAttemptId !== undefined)
    ? `<div class="small text-muted">attempt ${W.CurrentAttemptId}</div>` : '';
  return `
    <div class="col-md-3">
      <div class="card h-100 ${Border}" ${DivergeTip}>
        <div class="card-body p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <strong>${Dot} ${Name}</strong>
            <div class="d-flex gap-1">${Intent}${Truth}</div>
          </div>
          <div class="small text-muted">${W.Platform || '?'} | v${Ver}</div>
          ${CapsRow}
          ${AttemptLine}
          ${Mount}
          <div class="btn-group btn-group-sm mt-2 w-100" role="group">
            <button class="btn btn-outline-success" data-action="Online" data-worker="${Name}">Online</button>
            <button class="btn btn-outline-warning" data-action="Paused" data-worker="${Name}">Pause</button>
          </div>
        </div>
      </div>
    </div>`;
}

function PostStatus(WorkerName, Status) {
  return fetch(`/api/TeamStatus/Workers/${encodeURIComponent(WorkerName)}/Status`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({Status: Status})
  });
}

function PostCapability(WorkerName, Cap, Enabled) {
  return fetch(`/api/TeamStatus/Workers/${encodeURIComponent(WorkerName)}/Capability`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({[Cap]: Enabled})
  });
}

function Load() {
  fetch('/api/Admin/Workers/Snapshot')
    .then(r => r.json())
    .then(data => {
      if (!data.Success) throw new Error(data.Message || 'unknown');
      const StaleSec = data.Data.HeartbeatStaleThresholdSec || 300;
      const DivergenceSec = data.Data.WorkerIntentDivergenceSec || 60;
      document.getElementById('StaleNote').textContent =
        `Two badges per tile: left = operator intent (Workers.Status), right = worker truth (Workers.RuntimeState). Amber border if disagreement persists > ${DivergenceSec}s. Connectivity dot: green if heartbeat < ${StaleSec}s.`;
      const Grid = document.getElementById('WorkersGrid');
      Grid.innerHTML = data.Data.Workers.map(W => RenderTile(W, StaleSec, DivergenceSec)).join('');
      Grid.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const W = btn.getAttribute('data-worker');
          const S = btn.getAttribute('data-action');
          PostStatus(W, S).then(Load);
        });
      });
      Grid.querySelectorAll('input.cap-toggle').forEach(cb => {
        cb.addEventListener('change', () => {
          const W = cb.getAttribute('data-worker');
          const C = cb.getAttribute('data-cap');
          PostCapability(W, C, cb.checked).then(Load);
        });
      });
    })
    .catch(e => {
      document.getElementById('WorkersGrid').innerHTML =
        `<div class="col-12 text-danger">Failed to load: ${e.message}</div>`;
    });
}

Load();
setInterval(Load, 5000);
</script>
{% endblock %}
