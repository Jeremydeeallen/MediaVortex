<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediaVortex{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/menu-standards.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-video"></i> MediaVortex
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="/">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'scanning' %}active{% endif %}" href="/Scanning">
                            <i class="fas fa-search"></i> File Scanning
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'transcode_queue' %}active{% endif %}" href="/TranscodeQueue">
                            <i class="fas fa-list"></i> Queue
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'activity' %}active{% endif %}" href="/Activity">
                            <i class="fas fa-chart-line"></i> Activity
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'status' %}active{% endif %}" href="/Status">
                            <i class="fas fa-server"></i> Status
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'sqlqueries' %}active{% endif %}" href="/SQLQueries">
                            <i class="fas fa-database"></i> SQL Queries
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'optimization' %}active{% endif %}" href="/Optimization">
                            <i class="fas fa-bolt"></i> Optimization
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Persistent Error Display -->
    <div id="ErrorDisplay" class="d-none mb-3 mx-3">
        <div class="alert alert-danger d-flex align-items-start mb-0">
            <div class="flex-grow-1 me-2" style="min-width: 0;">
                <strong>Error:</strong>
                <div id="ErrorDisplayMessage" class="mt-1" style="word-break: break-word; user-select: text;"></div>
            </div>
            <div class="d-flex flex-shrink-0 gap-1">
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="copyErrorMessage()" title="Copy error message">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button type="button" class="btn-close" onclick="dismissError()"></button>
            </div>
        </div>
    </div>

    <!-- Alert Container for toast notifications -->
    <div id="AlertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <main class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/menu-standards.js') }}"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    // Global persistent error display functions
    function showPersistentError(message) {
        const errorDisplay = document.getElementById('ErrorDisplay');
        const errorMessage = document.getElementById('ErrorDisplayMessage');
        errorMessage.textContent = message;
        errorDisplay.classList.remove('d-none');
        errorDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyErrorMessage() {
        const errorMessage = document.getElementById('ErrorDisplayMessage').textContent;
        const copyBtn = document.querySelector('#ErrorDisplay .btn-outline-danger');
        const originalHtml = copyBtn.innerHTML;

        function showCopied() {
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
            setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(errorMessage).then(showCopied).catch(() => {
                fallbackCopy(errorMessage);
                showCopied();
            });
        } else {
            fallbackCopy(errorMessage);
            showCopied();
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function dismissError() {
        document.getElementById('ErrorDisplay').classList.add('d-none');
    }

    // Global showAlert function for non-error toasts
    function showToastAlert(message, type) {
        if (type === 'danger') {
            showPersistentError(message);
            return;
        }
        const alertContainer = document.getElementById('AlertContainer');
        const alertId = 'alert-' + Date.now();
        const alertHtml = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="${alertId}">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        alertContainer.insertAdjacentHTML('beforeend', alertHtml);
        setTimeout(() => {
            const alert = document.getElementById(alertId);
            if (alert) alert.remove();
        }, 5000);
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
