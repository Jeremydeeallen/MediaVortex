<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediaVortex{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Sleek, smaller font styling */
        body {
            font-size: 0.875rem;
            line-height: 1.4;
        }
        
        .navbar-brand {
            font-weight: 600;
            font-size: 1.1rem;
            color: #007bff !important;
        }
        
        .nav-link {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
        }
        
        .nav-link.active {
            background-color: #007bff !important;
            color: white !important;
            border-radius: 4px;
        }
        
        .card {
            box-shadow: 0 0.1rem 0.2rem rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 6px;
        }
        
        .card-header {
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            background-color: #f8f9fa;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .card-body {
            padding: 1rem;
        }
        
        .btn {
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
        }
        
        .btn-sm {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        
        .alert {
            border-radius: 4px;
            font-size: 0.8rem;
            padding: 0.6rem 1rem;
        }
        
        .table {
            font-size: 0.8rem;
        }
        
        .table th {
            background-color: #f8f9fa;
            border-top: none;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.6rem 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table td {
            padding: 0.5rem 0.75rem;
            vertical-align: middle;
        }
        
        .form-control, .form-select {
            font-size: 0.8rem;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.15rem rgba(0, 123, 255, 0.2);
        }
        
        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.25rem 0.5rem;
        }
        
        .pagination {
            font-size: 0.8rem;
        }
        
        .pagination .page-link {
            padding: 0.4rem 0.6rem;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
        }
        
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.3rem; }
        h3 { font-size: 1.1rem; }
        h4 { font-size: 1rem; }
        h5 { font-size: 0.9rem; }
        h6 { font-size: 0.85rem; }
        
        /* Compact spacing */
        .container-fluid {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        
        .mb-4 { margin-bottom: 1rem !important; }
        .mt-4 { margin-top: 1rem !important; }
        .py-4 { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-video"></i> MediaVortex
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="/">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}" href="/settings">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'scanning' %}active{% endif %}" href="/Scanning">
                            <i class="fas fa-search"></i> File Scanning
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'transcode_queue' %}active{% endif %}" href="/TranscodeQueue">
                            <i class="fas fa-list"></i> Queue
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'activity' %}active{% endif %}" href="/Activity">
                            <i class="fas fa-chart-line"></i> Activity
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'status' %}active{% endif %}" href="/Status">
                            <i class="fas fa-server"></i> Status
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
