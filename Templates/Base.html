<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediaVortex{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='vendor/fontawesome.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/menu-standards.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/TableRenderer.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-video"></i> MediaVortex
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint == 'queue_page' %}active{% endif %}" href="/Queue">
                            <i class="fas fa-list"></i> Queue
                        </a>
                        <span class="badge rounded-pill bg-primary d-none" id="NavQueueCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"></span>
                    </li>
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint == 'activity' %}active{% endif %}" href="/Activity">
                            <i class="fas fa-heartbeat"></i> Activity
                        </a>
                        <span class="badge rounded-pill bg-success d-none" id="NavActiveJobsCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"></span>
                    </li>
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint == 'work_bucket.render_page' and request.view_args and request.view_args.get('url_key') == 'Transcode' %}active{% endif %}" href="/Work/Transcode" data-bs-toggle="tooltip" data-bs-placement="bottom"
                           title="All 3 when transcode is required (video + audio + container)">
                            <i class="fas fa-film"></i> Transcode
                        </a>
                        <span class="badge rounded-pill bg-warning d-none" id="NavTranscodeCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"
                              title="Files needing Transcode WorkBucket"></span>
                    </li>
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint == 'work_bucket.render_page' and request.view_args and request.view_args.get('url_key') == 'Remux' %}active{% endif %}" href="/Work/Remux" data-bs-toggle="tooltip" data-bs-placement="bottom"
                           title="Container fix + audio normalization">
                            <i class="fas fa-box"></i> Remux
                        </a>
                        <span class="badge rounded-pill bg-warning d-none" id="NavRemuxCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"
                              title="Files needing Remux WorkBucket"></span>
                    </li>
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint == 'work_bucket.render_page' and request.view_args and request.view_args.get('url_key') == 'Audio' %}active{% endif %}" href="/Work/Audio" data-bs-toggle="tooltip" data-bs-placement="bottom"
                           title="Only audio is non-compliant">
                            <i class="fas fa-volume-up"></i> Audio
                        </a>
                        <span class="badge rounded-pill bg-warning d-none" id="NavAudioCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"
                              title="Files needing AudioFix WorkBucket"></span>
                    </li>
                    <li class="nav-item" style="position: relative;">
                        <a class="nav-link {% if request.endpoint and 'FailedJobs' in request.endpoint %}active{% endif %}" href="/FailedJobs">
                            <i class="fas fa-exclamation-triangle"></i> Failed Jobs
                        </a>
                        <span class="badge rounded-pill bg-danger d-none" id="NavFailedJobsCount"
                              style="position: absolute; top: 2px; right: -6px; font-size: 0.65em; padding: 3px 6px; pointer-events: none;"
                              title="Files at or above the FailureBudgetConfig cap"></span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint in ['status', 'sql_queries', 'optimization', 'settings'] or (request.endpoint and request.endpoint.startswith('audio_normalization.')) %}active{% endif %}" href="/settings">
                            <i class="fas fa-tools"></i> Admin
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text px-3 font-monospace" id="NavClock"
                              title="Current time in {{ display_timezone or 'UTC' }} (configurable on /settings)">
                            <i class="far fa-clock me-1"></i><span id="NavClockText">--:--:--</span>
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Persistent Error Display -->
    <div id="ErrorDisplay" class="d-none mb-3 mx-3">
        <div class="alert alert-danger d-flex align-items-start mb-0">
            <div class="flex-grow-1 me-2" style="min-width: 0;">
                <strong>Error:</strong>
                <div id="ErrorDisplayMessage" class="mt-1" style="word-break: break-word; user-select: text;"></div>
            </div>
            <div class="d-flex flex-shrink-0 gap-1">
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="copyErrorMessage()" title="Copy error message">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button type="button" class="btn-close" onclick="dismissError()"></button>
            </div>
        </div>
    </div>

    <!-- Alert Container for toast notifications -->
    <div id="AlertContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <main class="container-fluid mt-4">
        <div id="PageContent">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/menu-standards.js') }}"></script>
    <script src="{{ url_for('static', filename='js/TranscodeStatus.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/jquery.min.js') }}"></script>
    <script>
        // Display timezone resolved from SystemSettings.DisplayTimezone (server-injected).
        // All datetime values from the API arrive as UTC ISO-8601 strings (with Z suffix);
        // formatTime() in timezone.js converts them for display in this TZ.
        window.MV_TIMEZONE = "{{ display_timezone or 'UTC' }}";
    </script>
    <script src="{{ url_for('static', filename='js/timezone.js') }}"></script>
    <script>
    // Global persistent error display functions
    function showPersistentError(message) {
        const errorDisplay = document.getElementById('ErrorDisplay');
        const errorMessage = document.getElementById('ErrorDisplayMessage');
        errorMessage.textContent = message;
        errorDisplay.classList.remove('d-none');
        errorDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyErrorMessage() {
        const errorMessage = document.getElementById('ErrorDisplayMessage').textContent;
        const copyBtn = document.querySelector('#ErrorDisplay .btn-outline-danger');
        const originalHtml = copyBtn.innerHTML;

        function showCopied() {
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
            setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(errorMessage).then(showCopied).catch(() => {
                fallbackCopy(errorMessage);
                showCopied();
            });
        } else {
            fallbackCopy(errorMessage);
            showCopied();
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function dismissError() {
        document.getElementById('ErrorDisplay').classList.add('d-none');
    }

    // Global showAlert function for non-error toasts
    function showToastAlert(message, type) {
        if (type === 'danger') {
            showPersistentError(message);
            return;
        }
        const alertContainer = document.getElementById('AlertContainer');
        const alertId = 'alert-' + Date.now();
        const alertHtml = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="${alertId}">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        alertContainer.insertAdjacentHTML('beforeend', alertHtml);
        setTimeout(() => {
            const alert = document.getElementById(alertId);
            if (alert) alert.remove();
        }, 5000);
    }
    window.MvUpdateNavBadges = function() {
        fetch('/api/Activity/NavBadges')
            .then(r => r.json())
            .then(d => {
                const data = (d && d.Data) || {};
                const setBadge = (id, count) => {
                    const badge = document.getElementById(id);
                    if (!badge) return;
                    const n = Number(count) || 0;
                    if (n > 0) { badge.textContent = n.toLocaleString(); badge.classList.remove('d-none'); }
                    else { badge.classList.add('d-none'); }
                };
                setBadge('NavQueueCount', data.QueueCount);
                setBadge('NavActiveJobsCount', data.ActiveJobsCount);
                setBadge('NavFailedJobsCount', data.FailedJobsCount);
                setBadge('NavTranscodeCount', data.Transcode);
                setBadge('NavRemuxCount', data.Remux);
                setBadge('NavAudioCount', data.AudioFix);
            })
            .catch(() => {});
    };
    if (!window.MvNavBadgesTimerId) {
        window.MvUpdateNavBadges();
        window.MvNavBadgesTimerId = setInterval(window.MvUpdateNavBadges, 10000);
    } else {
        window.MvUpdateNavBadges();
    }
    // Activate Bootstrap tooltips so the nav-item title attributes pop on hover.
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
    // Global client-side error reporting
    (function() {
        var ErrorQueue = [];
        var Sending = false;

        function SendErrorToServer(ErrorData) {
            ErrorQueue.push(ErrorData);
            if (Sending) return;
            Sending = true;
            ProcessQueue();
        }

        function ProcessQueue() {
            if (ErrorQueue.length === 0) { Sending = false; return; }
            var Data = ErrorQueue.shift();
            fetch('/api/ClientLog', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(Data)
            }).catch(function() {}).finally(function() {
                setTimeout(ProcessQueue, 100);
            });
        }

        window.addEventListener('error', function(Event) {
            SendErrorToServer({
                Message: Event.message || 'Unknown error',
                Source: Event.filename || '',
                LineNo: Event.lineno || 0,
                ColNo: Event.colno || 0,
                Stack: Event.error && Event.error.stack ? Event.error.stack : '',
                Page: window.location.pathname,
                ErrorType: 'JavaScriptError'
            });
        });

        window.addEventListener('unhandledrejection', function(Event) {
            var Reason = Event.reason || {};
            SendErrorToServer({
                Message: Reason.message || String(Event.reason) || 'Unhandled promise rejection',
                Source: '',
                LineNo: 0,
                ColNo: 0,
                Stack: Reason.stack || '',
                Page: window.location.pathname,
                ErrorType: 'UnhandledPromiseRejection'
            });
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
