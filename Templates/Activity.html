{% extends "Base.html" %}

{% block title %}Activity - MediaVortex{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0"><i class="fas fa-heartbeat me-2"></i>Activity</h1>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-primary btn-sm" id="RefreshBtn">
                <i class="fas fa-sync-alt me-1"></i>Refresh
            </button>
            <button type="button" class="btn btn-success btn-sm" id="AutoRefreshBtn">
                <i class="fas fa-pause me-1"></i>Auto
            </button>
        </div>
    </div>

    <!-- Active Jobs -->
    <div class="card mb-4">
        <div class="card-header py-2 d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="fas fa-film me-2"></i>Active Jobs</h6>
            <div class="d-flex align-items-center gap-2">
                <span id="TranscodeStatusBadge" class="badge bg-secondary">Loading...</span>
                <button id="BtnStopAfterJob" class="btn btn-warning btn-sm" onclick="ActivityPage.StopAfterJob()" disabled>
                    <i class="fas fa-stop-circle me-1"></i>Stop After This Job
                </button>
                <button id="BtnResume" class="btn btn-success btn-sm d-none" onclick="ActivityPage.ResumeTranscoding()">
                    <i class="fas fa-play-circle me-1"></i>Resume
                </button>
            </div>
        </div>
        <div class="card-body p-0">
            <div id="NoJobInfo" class="text-muted py-3 px-3"><em>No active jobs</em></div>
            <div id="ActiveJobsTable" class="d-none">
                <table class="table table-sm table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">File</th>
                            <th style="width: 80px;">Type</th>
                            <th style="width: 110px;">Worker</th>
                            <th style="width: 90px;">Size</th>
                            <th style="width: 200px;">Progress</th>
                            <th style="width: 80px;">FPS</th>
                            <th style="width: 80px;">Speed</th>
                            <th style="width: 100px;">ETA</th>
                            <th style="width: 60px;"></th>
                        </tr>
                    </thead>
                    <tbody id="ActiveJobsBody"></tbody>
                    <tfoot id="ActiveJobsFooter" class="table-light fw-bold d-none">
                        <tr>
                            <td class="ps-3" colspan="3">Total</td>
                            <td id="FooterTotalSize">-</td>
                            <td></td>
                            <td id="FooterTotalFPS">-</td>
                            <td colspan="3"></td>
                        </tr>
                    </tfoot>
                </table>
                <div id="MachineFpsSummary" class="px-3 py-2 small text-muted border-top d-none"></div>
            </div>
        </div>
    </div>

    <!-- Workers -->
    <div class="card mb-4">
        <div class="card-header py-2 d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="fas fa-server me-2"></i>Workers</h6>
            <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-success" onclick="ActivityPage.SetAllWorkersStatus('Online')" title="Set All Online">
                    <i class="fas fa-play"></i> All Online
                </button>
                <button class="btn btn-outline-warning" onclick="ActivityPage.SetAllWorkersStatus('Draining')" title="Drain All">
                    <i class="fas fa-hourglass-half"></i> Drain All
                </button>
                <button class="btn btn-outline-danger" onclick="ActivityPage.SetAllWorkersStatus('Offline')" title="Set All Offline">
                    <i class="fas fa-power-off"></i> All Offline
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="row g-3" id="WorkersContainer">
                <div class="col-12 text-center text-muted py-2">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Quality Testing Queue moved to /Queue page (post-transcode-disposition feature, 2026-05-10).
         Active VMAF jobs (in-flight, not pending) appear in the Active Jobs section above. -->
</div>
{% endblock %}

{% block scripts %}
<script>
var ActivityPage = (function() {
    var Workers = [];
    var AutoRefreshEnabled = true;
    var OverviewInterval = null;
    // QT-specific polling moved to /Queue page; only OverviewInterval remains here.

    // -- Utilities --
    function FormatSizeMB(SizeMB) {
        var Size = parseFloat(SizeMB) || 0;
        if (Size >= 1024) return (Size / 1024).toFixed(2) + ' GB';
        return Math.round(Size) + ' MB';
    }

    function EscapeHtml(Text) {
        var Div = document.createElement('div');
        Div.textContent = Text || '';
        return Div.innerHTML;
    }

    function FormatDate(DateString) {
        if (!DateString) return '-';
        // Use the configured display timezone from window.MV_TIMEZONE (see static/js/timezone.js).
        // Storage is always UTC; this converts to the operator-selected zone.
        return window.formatTime ? window.formatTime(DateString, 'datetime') : new Date(DateString).toLocaleString();
    }

    function FormatHeartbeatAge(Sec) {
        if (Sec === null || Sec === undefined) return 'Never';
        Sec = Math.floor(Sec);
        if (Sec < 60) return Sec + 's ago';
        if (Sec < 3600) return Math.floor(Sec / 60) + ' min ago';
        return Math.floor(Sec / 3600) + ' hr ago';
    }

    function GetWorkerStatusBadge(Status) {
        var Map = {
            'Online': 'bg-success',
            'Draining': 'bg-warning text-dark',
            'Offline': 'bg-danger'
        };
        return Map[Status] || 'bg-secondary';
    }

    // GetQTStatusBadgeClass / GetPriorityBadgeClass moved to /Queue (the QT
    // queue table is the only consumer and lives there now).

    // -- Active Jobs (transcode + VMAF rendered into the same table) --
    // Both fetches go in parallel and the table is rendered ONCE with combined
    // data. Earlier two-step approach (RenderActiveJobs first, LoadActiveVmaf
    // appending after) caused visible flicker -- the table was cleared and
    // rebuilt with only transcode rows, then ~50ms later the VMAF row was
    // appended; transitions through "no transcode but VMAF running" briefly
    // showed the "No active jobs" message. Promise.all gives a single render.
    function LoadOverview() {
        var OverviewP = fetch('/api/TeamStatus/Overview').then(function(R) { return R.json(); }).catch(function() { return null; });
        var VmafP = fetch('/api/QualityTesting/Progress').then(function(R) { return R.json(); }).catch(function() { return null; });
        Promise.all([OverviewP, VmafP]).then(function(Both) {
            var Overview = Both[0];
            var VmafResp = Both[1];
            if (!Overview || !Overview.Success) return;
            var VmafJob = (VmafResp && VmafResp.Success && VmafResp.IsRunning)
                ? (VmafResp.Progress || VmafResp.CurrentJob || null)
                : null;
            RenderActiveJobs(Overview.Data, VmafJob);
        });
    }

    function RenderActiveJobs(D, VmafJob) {
        var Status = D.ServiceStatus;
        var IsProcessing = D.IsProcessing;
        var ActiveJobs = D.ActiveJobs || [];

        var Badge = document.getElementById('TranscodeStatusBadge');
        var BtnStop = document.getElementById('BtnStopAfterJob');
        var BtnResume = document.getElementById('BtnResume');
        var NoJob = document.getElementById('NoJobInfo');
        var JobsTable = document.getElementById('ActiveJobsTable');
        var JobsBody = document.getElementById('ActiveJobsBody');

        var R = RenderTranscodeStatusBadge(Badge, Status, IsProcessing);
        BtnStop.disabled = R.StopDisabled;
        BtnResume.classList.toggle('d-none', !R.ShowResume);

        var TranscodeRows = ActiveJobs.map(function(Job) {
            var FileName = Job.FileName || Job.FilePath.split(/[/\\]/).pop();
            var Pct = (Job.ProgressPercent || 0).toFixed(1);
            var IsStuck = Job.IsStuck || false;
            var StatusIcon = IsStuck
                ? '<i class="fas fa-exclamation-triangle me-1 text-warning"></i>'
                : '<i class="fas fa-spinner fa-spin me-1 text-primary"></i>';
            var RowClass = IsStuck ? ' class="table-warning"' : '';
            var ResetBtn = IsStuck
                ? '<button class="btn btn-outline-warning btn-sm py-0 px-1" onclick="ActivityPage.ResetStuckJob(' + Job.QueueId + ')" title="Reset to Pending"><i class="fas fa-redo-alt"></i></button>'
                : '';
            var ProgressBar = IsStuck
                ? '<span class="text-warning fw-bold">Stuck</span>'
                : '<div class="d-flex align-items-center gap-2">' +
                    '<div class="progress flex-grow-1" style="height: 18px;">' +
                        '<div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" ' +
                            'role="progressbar" style="width: ' + Pct + '%" ' +
                            'aria-valuenow="' + Pct + '" aria-valuemin="0" aria-valuemax="100"></div>' +
                    '</div>' +
                    '<small class="text-nowrap">' + Pct + '%</small>' +
                '</div>';
            var Mode = Job.ProcessingMode || 'Transcode';
            var ModeBadgeClass = (Mode === 'Remux') ? 'bg-info'
                                : (Mode === 'SubtitleFix') ? 'bg-warning text-dark'
                                : 'bg-primary';
            return '<tr' + RowClass + '>' +
                '<td class="ps-3">' + StatusIcon +
                    '<span title="' + (Job.FilePath || '').replace(/"/g, '&quot;') + '">' + EscapeHtml(FileName) + '</span></td>' +
                '<td><span class="badge ' + ModeBadgeClass + '">' + EscapeHtml(Mode) + '</span></td>' +
                '<td>' + (Job.ClaimedBy ? EscapeHtml(Job.ClaimedBy) : '<em class="text-muted">-</em>') + '</td>' +
                '<td>' + (Job.SizeMB ? FormatSizeMB(Job.SizeMB) : '-') + '</td>' +
                '<td>' + ProgressBar + '</td>' +
                '<td>' + (IsStuck ? '-' : (Job.CurrentFPS ? parseFloat(Job.CurrentFPS).toFixed(1) : '-')) + '</td>' +
                '<td>' + (IsStuck ? '-' : (Job.CurrentSpeed || '-')) + '</td>' +
                '<td>' + (IsStuck ? '-' : (Job.ETA || '-')) + '</td>' +
                '<td class="text-center">' + ResetBtn + '</td>' +
            '</tr>';
        });

        var VmafRow = '';
        if (VmafJob) {
            var VFile = VmafJob.FileName || (VmafJob.OriginalFilePath ? VmafJob.OriginalFilePath.split(/[/\\]/).pop() : 'VMAF');
            var VPct = (parseFloat(VmafJob.ProgressPercentage) || 0).toFixed(1);
            VmafRow = '<tr>' +
                '<td class="ps-3"><i class="fas fa-chart-line me-1 text-info"></i>' +
                    '<span title="' + EscapeHtml(VmafJob.OriginalFilePath || '') + '">' + EscapeHtml(VFile) + '</span></td>' +
                '<td><span class="badge bg-info">VMAF</span></td>' +
                '<td><em class="text-muted">-</em></td>' +
                '<td>-</td>' +
                '<td><div class="d-flex align-items-center gap-2">' +
                    '<div class="progress flex-grow-1" style="height: 18px;">' +
                        '<div class="progress-bar progress-bar-striped progress-bar-animated bg-info" ' +
                            'role="progressbar" style="width: ' + VPct + '%" ' +
                            'aria-valuenow="' + VPct + '" aria-valuemin="0" aria-valuemax="100"></div>' +
                    '</div>' +
                    '<small class="text-nowrap">' + VPct + '%</small>' +
                '</div></td>' +
                '<td>-</td>' +
                '<td>' + EscapeHtml(String(VmafJob.ProcessingSpeed || '-')) + '</td>' +
                '<td>' + EscapeHtml(String(VmafJob.ETA || '-')) + '</td>' +
                '<td>-</td>' +
            '</tr>';
        }

        // Single-pass render: combined transcode + VMAF rows. Visibility derived
        // from the COMBINED count, not just transcode count -- earlier two-step
        // approach hid the table whenever transcode finished but VMAF was still
        // running, then unhid it on the next async tick (visible flicker).
        var CombinedHtml = TranscodeRows.join('') + VmafRow;
        if (CombinedHtml) {
            NoJob.classList.add('d-none');
            JobsTable.classList.remove('d-none');
            JobsBody.innerHTML = CombinedHtml;
            RenderJobFooter(ActiveJobs);
        } else {
            NoJob.classList.remove('d-none');
            JobsTable.classList.add('d-none');
            JobsBody.innerHTML = '';
            document.getElementById('ActiveJobsFooter').classList.add('d-none');
            document.getElementById('MachineFpsSummary').classList.add('d-none');
        }
    }

    function RenderJobFooter(ActiveJobs) {
        var Footer = document.getElementById('ActiveJobsFooter');
        var MachineSummary = document.getElementById('MachineFpsSummary');

        if (!ActiveJobs || ActiveJobs.length === 0) {
            Footer.classList.add('d-none');
            MachineSummary.classList.add('d-none');
            return;
        }

        // Compute totals
        var TotalFPS = 0;
        var TotalSizeMB = 0;
        var MachineFPS = {};  // WorkerName -> sum of FPS

        ActiveJobs.forEach(function(Job) {
            var Fps = parseFloat(Job.CurrentFPS) || 0;
            TotalFPS += Fps;
            TotalSizeMB += parseFloat(Job.SizeMB) || 0;

            var Worker = Job.ClaimedBy || 'Unknown';
            // Group by machine: strip the container suffix (larry-worker-1 -> larry)
            var Machine = Worker.replace(/-worker-\d+$/, '') || Worker;
            if (!MachineFPS[Machine]) MachineFPS[Machine] = 0;
            MachineFPS[Machine] += Fps;
        });

        // Render footer row
        document.getElementById('FooterTotalSize').textContent = TotalSizeMB > 0 ? FormatSizeMB(TotalSizeMB) : '-';
        document.getElementById('FooterTotalFPS').textContent = TotalFPS > 0 ? TotalFPS.toFixed(1) : '-';
        Footer.classList.remove('d-none');

        // Render per-machine FPS summary
        var MachineNames = Object.keys(MachineFPS).sort();
        if (MachineNames.length > 1) {
            var Parts = MachineNames.map(function(M) {
                return '<strong>' + EscapeHtml(M) + '</strong>: ' + MachineFPS[M].toFixed(1) + ' fps';
            });
            MachineSummary.innerHTML = '<i class="fas fa-tachometer-alt me-1"></i>FPS by machine: ' + Parts.join(' &nbsp;|&nbsp; ');
            MachineSummary.classList.remove('d-none');
        } else {
            MachineSummary.classList.add('d-none');
        }
    }

    function StopAfterJob() {
        if (!confirm('Stop transcoding after the current job finishes?')) return;
        fetch('/api/Transcode/Stop', { method: 'POST' })
            .then(function(R) { return R.json(); })
            .then(function(Result) {
                if (Result.Success) {
                    showToastAlert('Transcode will stop after the current job.', 'success');
                    LoadOverview();
                } else {
                    showToastAlert(Result.ErrorMessage || 'Failed to stop.', 'danger');
                }
            })
            .catch(function() { showToastAlert('Failed to contact server.', 'danger'); });
    }

    function ResumeTranscoding() {
        fetch('/api/Transcode/Start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ MaxConcurrentJobs: 1 })
        })
            .then(function(R) { return R.json(); })
            .then(function(Result) {
                if (Result.Success) {
                    showToastAlert('Transcoding resumed.', 'success');
                    LoadOverview();
                } else {
                    showToastAlert(Result.ErrorMessage || 'Failed to resume.', 'danger');
                }
            })
            .catch(function() { showToastAlert('Failed to contact server.', 'danger'); });
    }

    function ResetStuckJob(QueueId) {
        if (!confirm('Reset this stuck job back to Pending?')) return;
        fetch('/api/TeamStatus/ResetStuckJob', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ QueueId: QueueId })
        })
            .then(function(R) { return R.json(); })
            .then(function(Result) {
                if (Result.Success) {
                    showToastAlert('Job reset to Pending.', 'success');
                    LoadOverview();
                } else {
                    showToastAlert(Result.ErrorMessage || 'Failed to reset job.', 'danger');
                }
            })
            .catch(function() { showToastAlert('Failed to contact server.', 'danger'); });
    }

    // -- Workers --
    function LoadWorkers() {
        fetch('/api/TeamStatus/Workers')
            .then(function(R) { return R.json(); })
            .then(function(Data) {
                if (Data.Success && Data.Data) {
                    Workers = Data.Data;
                    RenderWorkers(Workers);
                }
            })
            .catch(function(E) { console.error('Workers error:', E); });
    }

    function RenderWorkers(WorkerList) {
        var Container = document.getElementById('WorkersContainer');
        Container.innerHTML = '';
        if (!WorkerList || WorkerList.length === 0) {
            Container.innerHTML = '<div class="col-12 text-center text-muted py-2">No workers registered</div>';
            return;
        }
        WorkerList.forEach(function(W) {
            var HeartbeatAge = W.HeartbeatAgeSec;
            var IsOnline = HeartbeatAge !== null && HeartbeatAge !== undefined && HeartbeatAge < 300;
            var DisplayStatus = IsOnline ? (W.Status || 'Online') : 'Offline';
            var BadgeCls = GetWorkerStatusBadge(DisplayStatus);
            var HeartbeatText = FormatHeartbeatAge(HeartbeatAge);
            var WorkerNameEsc = EscapeHtml(W.WorkerName);

            var Col = document.createElement('div');
            Col.className = 'col-6 col-lg-4 col-xl-3';
            Col.innerHTML = '<div class="card h-100">' +
                '<div class="card-body py-3">' +
                    '<h6 class="card-title mb-2 d-flex justify-content-between align-items-center">' +
                        '<span><i class="fas fa-desktop me-1"></i>' + WorkerNameEsc + '</span>' +
                        '<span class="badge ' + BadgeCls + '">' + DisplayStatus + '</span>' +
                    '</h6>' +
                    '<div class="small text-muted mb-2">' +
                        '<div class="d-flex justify-content-between"><span>Platform:</span><span>' + EscapeHtml(W.Platform || '-') + '</span></div>' +
                        '<div class="d-flex justify-content-between"><span>Heartbeat:</span><span>' + HeartbeatText + '</span></div>' +
                        '<div class="d-flex justify-content-between"><span>Max Jobs:</span><span>' + (W.MaxConcurrentJobs || 0) + '</span></div>' +
                        '<div class="d-flex justify-content-between"><span>CPU Threads:</span><span>' + (W.MaxCpuThreads || 'Auto') + '</span></div>' +
                        '<div class="d-flex justify-content-between"><span>Interlaced:</span><span>' + (W.AcceptsInterlaced ? 'Yes' : 'No') + '</span></div>' +
                    '</div>' +
                    '<div class="btn-group btn-group-sm w-100 mb-2" role="group">' +
                        '<button class="btn ' + (DisplayStatus === 'Online' ? 'btn-success' : 'btn-outline-success') + '" onclick="ActivityPage.SetWorkerStatus(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'Online\')">Online</button>' +
                        '<button class="btn ' + (DisplayStatus === 'Draining' ? 'btn-warning' : 'btn-outline-warning') + '" onclick="ActivityPage.SetWorkerStatus(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'Draining\')">Drain</button>' +
                        '<button class="btn ' + (DisplayStatus === 'Offline' ? 'btn-danger' : 'btn-outline-danger') + '" onclick="ActivityPage.SetWorkerStatus(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'Offline\')">Offline</button>' +
                    '</div>' +
                    '<div class="small text-muted mb-1">Capabilities</div>' +
                    '<div class="btn-group btn-group-sm w-100" role="group" aria-label="Worker capabilities">' +
                        '<button class="btn ' + (W.TranscodeEnabled ? 'btn-primary' : 'btn-outline-primary') + '" title="Transcode" ' +
                          'onclick="ActivityPage.ToggleWorkerCapability(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'TranscodeEnabled\', ' + (W.TranscodeEnabled ? 'true' : 'false') + ')">' +
                          '<i class="fas fa-film me-1"></i>Transcode</button>' +
                        '<button class="btn ' + (W.QualityTestEnabled ? 'btn-info' : 'btn-outline-info') + '" title="VMAF quality test" ' +
                          'onclick="ActivityPage.ToggleWorkerCapability(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'QualityTestEnabled\', ' + (W.QualityTestEnabled ? 'true' : 'false') + ')">' +
                          '<i class="fas fa-chart-line me-1"></i>VMAF</button>' +
                        '<button class="btn ' + (W.ScanEnabled ? 'btn-secondary' : 'btn-outline-secondary') + '" title="Continuous file scanning" ' +
                          'onclick="ActivityPage.ToggleWorkerCapability(\'' + WorkerNameEsc.replace(/'/g, "\\'") + '\', \'ScanEnabled\', ' + (W.ScanEnabled ? 'true' : 'false') + ')">' +
                          '<i class="fas fa-search me-1"></i>Scan</button>' +
                    '</div>' +
                    '<div class="form-text small mt-1">Capability changes apply within 60s (no restart).</div>' +
                '</div>' +
            '</div>';
            Container.appendChild(Col);
        });
    }

    function SetWorkerStatus(WorkerName, NewStatus) {
        fetch('/api/TeamStatus/Workers/' + encodeURIComponent(WorkerName) + '/Status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Status: NewStatus })
        })
            .then(function(R) { return R.json(); })
            .then(function(Result) {
                if (Result.Success) {
                    showToastAlert(WorkerName + ' set to ' + NewStatus, 'success');
                    LoadWorkers();
                } else {
                    showToastAlert(Result.ErrorMessage || 'Failed to update worker status.', 'danger');
                }
            })
            .catch(function() { showToastAlert('Failed to contact server.', 'danger'); });
    }

    function SetAllWorkersStatus(NewStatus) {
        if (!confirm('Set all workers to ' + NewStatus + '?')) return;
        Workers.forEach(function(W) {
            SetWorkerStatus(W.WorkerName, NewStatus);
        });
    }

    function ToggleWorkerCapability(WorkerName, Column, CurrentValue) {
        // Toggle the bool flag. Capability poller in WorkerService picks this up
        // within 60s and starts/stops the corresponding capability accordingly.
        var NewValue = !CurrentValue;
        var Body = {};
        Body[Column] = NewValue;
        fetch('/api/TeamStatus/Workers/' + encodeURIComponent(WorkerName) + '/Capability', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Body)
        })
            .then(function(R) { return R.json(); })
            .then(function(Result) {
                if (Result.Success) {
                    var Pretty = Column.replace(/Enabled$/, '');
                    showToastAlert(WorkerName + ' ' + Pretty + ' set to ' + NewValue, 'success');
                    LoadWorkers();
                } else {
                    showToastAlert(Result.ErrorMessage || Result.Message || 'Failed to update worker capability.', 'danger');
                }
            })
            .catch(function() { showToastAlert('Failed to contact server.', 'danger'); });
    }

    // VMAF rows are now rendered inline by RenderActiveJobs (combined-pass).
    // The previous LoadActiveVmaf/AppendActiveVmafRow helpers are removed --
    // see LoadOverview's Promise.all pattern.

    // -- Refresh / Polling --
    function RefreshAll() {
        LoadOverview();
        LoadWorkers();
    }

    function StartPolling() {
        // Overview polls at 2s for active-job progress.
        OverviewInterval = setInterval(LoadOverview, 2000);
    }

    function StopPolling() {
        if (OverviewInterval) { clearInterval(OverviewInterval); OverviewInterval = null; }
    }

    function ToggleAutoRefresh() {
        var Btn = document.getElementById('AutoRefreshBtn');
        if (AutoRefreshEnabled) {
            StopPolling();
            AutoRefreshEnabled = false;
            Btn.innerHTML = '<i class="fas fa-play me-1"></i>Auto';
            Btn.classList.remove('btn-success');
            Btn.classList.add('btn-outline-success');
        } else {
            StartPolling();
            AutoRefreshEnabled = true;
            Btn.innerHTML = '<i class="fas fa-pause me-1"></i>Auto';
            Btn.classList.remove('btn-outline-success');
            Btn.classList.add('btn-success');
        }
    }

    // -- Init --
    function Init() {
        document.getElementById('RefreshBtn').addEventListener('click', RefreshAll);
        document.getElementById('AutoRefreshBtn').addEventListener('click', ToggleAutoRefresh);
        // RefreshQualityTestingBtn moved to /Queue page.

        RefreshAll();
        StartPolling();
    }

    document.addEventListener('DOMContentLoaded', Init);

    return {
        StopAfterJob: StopAfterJob,
        ResumeTranscoding: ResumeTranscoding,
        ResetStuckJob: ResetStuckJob,
        SetWorkerStatus: SetWorkerStatus,
        SetAllWorkersStatus: SetAllWorkersStatus,
        ToggleWorkerCapability: ToggleWorkerCapability
        // RetryQualityTest moved to /Queue page.
    };
})();
</script>
{% endblock %}
