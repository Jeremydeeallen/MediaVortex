{% extends "Base.html" %}

{% block title %}Queue - MediaVortex{% endblock %}

{% block head %}
<style>
.queue-card { transition: opacity 0.15s, transform 0.15s; }
.queue-card.dragging { opacity: 0.55; }
.queue-card.drag-over-top { box-shadow: 0 -3px 0 0 #0d6efd inset; }
.queue-card.drag-over-bottom { box-shadow: 0 3px 0 0 #0d6efd inset; }
.queue-drag-handle { cursor: grab; user-select: none; color: #6c757d; }
.queue-drag-handle:active { cursor: grabbing; }
.queue-drag-handle:hover { color: #0d6efd; }
.queue-collapse-toggle { cursor: pointer; user-select: none; color: #6c757d; transition: transform 0.15s; }
.queue-collapse-toggle:hover { color: #0d6efd; }
.queue-card.collapsed .queue-collapse-toggle { transform: rotate(-90deg); }
.queue-card.collapsed .card-body { display: none; }
.queue-summary { color: #6c757d; font-size: 0.85em; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Queue</h1>
    <div class="page-action-buttons d-flex gap-2 align-items-center">
        <button type="button" class="btn btn-outline-danger btn-sm" id="CleanupDuplicatesBtn">
            <i class="fas fa-broom"></i> Cleanup Duplicates
        </button>
        <div class="input-group" style="width: auto;">
            <input type="number" class="form-control form-control-sm" id="RemoveBySizeInput" placeholder="MB" style="width: 80px;" min="1" step="1">
            <button type="button" class="btn btn-outline-warning btn-sm" id="RemoveBySizeBtn">
                <i class="fas fa-filter"></i> Remove &lt; Size
            </button>
        </div>
        <button type="button" class="btn btn-warning btn-sm" id="ClearQueueBtn">
            <i class="fas fa-trash"></i> Clear Queue
        </button>
        <button type="button" class="btn btn-secondary btn-sm" id="RefreshBtn">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>
</div>

<div id="QueueCardsHost"></div>

<template id="QueueCardTemplate">
    <div class="card mb-4 queue-card" draggable="true">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <span class="queue-drag-handle" title="Drag to reorder"><i class="fas fa-grip-vertical"></i></span>
                <span class="queue-collapse-toggle" title="Collapse / expand"><i class="fas fa-chevron-down"></i></span>
                <h5 class="mb-0 queue-card-title"></h5>
                <span class="queue-summary ms-2"></span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-secondary queue-count-badge">0 items</span>
            </div>
        </div>
        <div class="card-body">
            <div class="queue-table-mount"></div>
            <nav class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted queue-pagination-info">-</span>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-secondary queue-prev-btn" disabled>Previous</button>
                        <button type="button" class="btn btn-outline-secondary queue-next-btn" disabled>Next</button>
                    </div>
                </div>
            </nav>
        </div>
    </div>
</template>

<!-- Priority Update Modal -->
<div class="modal fade" id="PriorityModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Priority</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="NewPriorityInput" class="form-label">New Priority</label>
                    <input type="number" class="form-control" id="NewPriorityInput" min="1" max="200">
                    <div class="form-text">1-194 = auto-assigned by impact score. 195-200 = reserved for manual override.</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="ConfirmPriorityBtn">Update Priority</button>
            </div>
        </div>
    </div>
</div>

<script>
class QueueActions {
    constructor() {
        this.currentItemId = null;
        document.getElementById('CleanupDuplicatesBtn').addEventListener('click', () => this.cleanupDuplicates());
        document.getElementById('ClearQueueBtn').addEventListener('click', () => this.clearQueue());
        document.getElementById('RemoveBySizeBtn').addEventListener('click', () => this.removeBySize());
        document.getElementById('RemoveBySizeInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') this.removeBySize(); });
        document.getElementById('RefreshBtn').addEventListener('click', () => this.refreshAll());
        document.getElementById('ConfirmPriorityBtn').addEventListener('click', () => this.updatePriority());
    }
    refreshAll() { (window.MvQueueRefreshFns || []).forEach(fn => { try { fn(); } catch (e) {} }); }
    async clearQueue() {
        try {
            const r = await fetch('/api/TranscodeQueue/ClearQueue', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const d = await r.json();
            if (d.Success) { this.showAlert(d.Message || `Cleared ${d.ItemsCleared || 0} items`, 'success'); this.refreshAll(); }
            else this.showAlert('Error clearing queue: ' + d.ErrorMessage, 'danger');
        } catch (e) { this.showAlert('Error clearing queue: ' + e.message, 'danger'); }
    }
    async removeBySize() {
        const input = document.getElementById('RemoveBySizeInput');
        const maxSizeMB = parseFloat(input.value);
        if (!maxSizeMB || maxSizeMB <= 0) { this.showAlert('Enter a valid size in MB', 'warning'); input.focus(); return; }
        if (!confirm(`Remove all pending queue items smaller than ${maxSizeMB} MB?`)) return;
        try {
            const r = await fetch('/api/TranscodeQueue/RemoveBySize', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ MaxSizeMB: maxSizeMB }) });
            const d = await r.json();
            if (d.Success) { this.showAlert(`Removed ${d.ItemsRemoved || 0} items smaller than ${maxSizeMB} MB`, 'success'); input.value = ''; this.refreshAll(); }
            else this.showAlert('Error: ' + (d.ErrorMessage || 'Unknown'), 'danger');
        } catch (e) { this.showAlert('Error removing items: ' + e.message, 'danger'); }
    }
    async cleanupDuplicates() {
        if (!confirm('Remove duplicate MediaFile entries from the database (keep oldest per path). Continue?')) return;
        try {
            const r = await fetch('/api/Scan/CleanupDuplicates', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const d = await r.json();
            if (d.Success) { this.showAlert(`Cleanup complete: ${d.DuplicatesRemoved || 0} duplicates removed`, 'success'); this.refreshAll(); }
            else this.showAlert('Error: ' + (d.Message || 'Unknown'), 'danger');
        } catch (e) { this.showAlert('Error cleaning up duplicates: ' + e.message, 'danger'); }
    }
    async removeJob(itemId, status) {
        const msg = status === 'Running' ? 'This job is running. This will stop FFmpeg and remove the job. Continue?' : 'Remove this job from the queue?';
        if (!confirm(msg)) return;
        try {
            const r = await fetch('/api/TranscodeQueue/RemoveJob', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ItemId: itemId }) });
            const d = await r.json();
            if (d.Success) { this.showAlert(status === 'Running' ? 'Running job cancelled and removed' : 'Job removed', 'success'); this.refreshAll(); }
            else this.showAlert('Error removing job: ' + d.ErrorMessage, 'danger');
        } catch (e) { this.showAlert('Error removing job: ' + e.message, 'danger'); }
    }
    updatePriorityModal(itemId, currentPriority) {
        this.currentItemId = itemId;
        document.getElementById('NewPriorityInput').value = currentPriority;
        new bootstrap.Modal(document.getElementById('PriorityModal')).show();
    }
    async updatePriority() {
        const newPriority = parseInt(document.getElementById('NewPriorityInput').value);
        try {
            const r = await fetch('/api/TranscodeQueue/PrioritizeJob', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ItemId: this.currentItemId, NewPriority: newPriority }) });
            const d = await r.json();
            if (d.Success) { this.showAlert('Priority updated', 'success'); bootstrap.Modal.getInstance(document.getElementById('PriorityModal')).hide(); this.refreshAll(); }
            else this.showAlert('Error: ' + d.ErrorMessage, 'danger');
        } catch (e) { this.showAlert('Error: ' + e.message, 'danger'); }
    }
    async retryQualityTest(jobId) {
        try {
            const r = await fetch('/api/QualityTest/Retry', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ JobId: jobId }) });
            const d = await r.json();
            if (d && d.Success) { this.showAlert(`Quality test retry queued for job ${jobId}`, 'success'); this.refreshAll(); }
            else if (d) this.showAlert('Retry failed: ' + d.Message, 'danger');
        } catch (e) { this.showAlert('Retry error: ' + e.message, 'danger'); }
    }
    showAlert(message, type) { if (typeof showToastAlert === 'function') showToastAlert(message, type); else alert(message); }
}

document.addEventListener('DOMContentLoaded', function() { window.queueManager = new QueueActions(); });
</script>

<script type="module">
import { TableRenderer } from "/static/js/TableRenderer/TableRenderer.js";
import { TableRendererConfig } from "/static/js/TableRenderer/TableRendererConfig.js";
import { EventBus } from "/static/js/TableRenderer/EventBus.js";
import { ServerPagedDataSource } from "/static/js/TableRenderer/DataSources/ServerPagedDataSource.js";
import { SortController } from "/static/js/TableRenderer/SortController.js";
import { PaginationController } from "/static/js/TableRenderer/PaginationController.js";
import { FilterController } from "/static/js/TableRenderer/FilterController.js";
import { ColumnDefinition } from "/static/js/TableRenderer/ColumnDefinition.js";
import { ICellRenderer } from "/static/js/TableRenderer/Interfaces/ICellRenderer.js";

const FormatDate = (s) => { if (!s) return '-'; return window.formatTime ? window.formatTime(s, 'datetime') : new Date(s).toLocaleString(); };
const FormatSize = (mb) => { const n = parseFloat(mb) || 0; return n >= 1024 ? (n/1024).toFixed(2) + ' GB' : n.toFixed(2) + ' MB'; };
const PageInfo = (Total, Page, PageSize) => { const s = Total === 0 ? 0 : (Page * PageSize) + 1; const e = Math.min((Page + 1) * PageSize, Total); return `Showing ${s} to ${e} of ${Total.toLocaleString()} entries`; };
const Badge = (Text, Map, Fallback) => { const s = document.createElement('span'); s.className = 'badge ' + (Map[Text] || Fallback || 'bg-secondary'); s.textContent = Text == null ? '' : String(Text); return s; };

class TextR extends ICellRenderer { Render(v) { const s = document.createElement('span'); s.textContent = v == null ? '' : String(v); return s; } }
class SizeR extends ICellRenderer { Render(v) { const s = document.createElement('span'); s.textContent = FormatSize(v); return s; } }
class DateR extends ICellRenderer { Render(v) { const s = document.createElement('span'); s.textContent = FormatDate(v); return s; } }
class StatusR extends ICellRenderer { Render(v) { return Badge(v, {'Pending':'bg-warning','Running':'bg-info','Completed':'bg-success','Failed':'bg-danger','Cancelled':'bg-secondary'}); } }
class PriorityR extends ICellRenderer { Render(v) { const p = Number(v) || 0; let c = 'bg-secondary'; if (p >= 195) c = 'bg-danger'; else if (p >= 150) c = 'bg-warning'; else if (p >= 75) c = 'bg-info'; const s = document.createElement('span'); s.className = 'badge ' + c; s.textContent = String(p); return s; } }
class ClaimR extends ICellRenderer { Render(v) { if (!v) { const s = document.createElement('span'); s.className = 'text-muted'; s.textContent = '-'; return s; } const s = document.createElement('small'); s.textContent = String(v); return s; } }
class TQActionsR extends ICellRenderer { Render(_v, Row) {
    const g = document.createElement('div'); g.className = 'btn-group btn-group-sm';
    const e = document.createElement('button'); e.type = 'button'; e.className = 'btn btn-outline-primary'; e.title = 'Update Priority'; e.innerHTML = '<i class="fas fa-edit"></i>';
    e.addEventListener('click', (ev) => { ev.stopPropagation(); if (window.queueManager) window.queueManager.updatePriorityModal(Row.Id, Row.Priority); });
    const d = document.createElement('button'); d.type = 'button'; d.className = 'btn btn-outline-danger'; d.title = Row.Status === 'Running' ? 'Cancel & Remove' : 'Remove'; d.innerHTML = '<i class="fas fa-trash"></i>';
    d.addEventListener('click', (ev) => { ev.stopPropagation(); if (window.queueManager) window.queueManager.removeJob(Row.Id, Row.Status); });
    g.appendChild(e); g.appendChild(d); return g;
} }
class VmafR extends ICellRenderer { Render(v) { if (v == null) { const s = document.createElement('span'); s.textContent = '-'; return s; } const n = Number(v); const c = n >= 80 ? 'bg-success' : (n >= 60 ? 'bg-warning' : 'bg-danger'); const s = document.createElement('span'); s.className = 'badge ' + c; s.textContent = n.toFixed(2); return s; } }
class QtStatusR extends ICellRenderer { Render(v) { return Badge(v, {'Pending':'bg-warning','Running':'bg-info','Completed':'bg-success','Failed':'bg-danger'}); } }
class QtPriR extends ICellRenderer { Render(v) { const p = Number(v) || 50; let c = 'bg-secondary'; if (p >= 80) c = 'bg-danger'; else if (p >= 60) c = 'bg-warning'; else if (p >= 40) c = 'bg-info'; const s = document.createElement('span'); s.className = 'badge ' + c; s.textContent = String(p); return s; } }
class QtFileR extends ICellRenderer { Render(_v, Row) { const fn = Row.FileName || (Row.OriginalFilePath ? Row.OriginalFilePath.split('\\').pop() : 'Unknown'); const d = document.createElement('div'); d.className = 'text-truncate'; d.style.maxWidth = '250px'; d.title = Row.OriginalFilePath || ''; d.textContent = fn; return d; } }
class QtProgressR extends ICellRenderer { Render(_v, Row) { const w = document.createElement('span'); if (Row.Status === 'Running') w.innerHTML = '<div class="d-flex align-items-center"><div class="spinner-border spinner-border-sm text-info me-2"></div><small class="text-muted">Loading...</small></div>'; else if (Row.Status === 'Completed') w.innerHTML = '<span class="badge bg-success"><i class="fas fa-check"></i> Done</span>'; else if (Row.Status === 'Failed') w.innerHTML = '<span class="badge bg-danger"><i class="fas fa-times"></i> Failed</span>'; else w.textContent = '-'; return w; } }
class QtActionsR extends ICellRenderer { Render(_v, Row) {
    const w = document.createElement('span'); const retries = Row.RetryCount || 0; const max = Row.MaxRetries || 3;
    if (Row.Status === 'Failed' && retries < max) {
        const b = document.createElement('button'); b.type = 'button'; b.className = 'btn btn-sm btn-outline-warning'; b.title = 'Retry'; b.innerHTML = '<i class="fas fa-redo"></i>';
        b.addEventListener('click', (ev) => { ev.stopPropagation(); if (window.queueManager) window.queueManager.retryQualityTest(Row.Id); }); w.appendChild(b);
    } else if (Row.ErrorMessage) { const s = document.createElement('span'); s.className = 'text-danger'; s.title = String(Row.ErrorMessage); s.innerHTML = '<i class="fas fa-exclamation-triangle"></i>'; w.appendChild(s); }
    else w.textContent = '-'; return w;
} }

// Definitions for each queue (mode = TranscodeQueue.ProcessingMode; null for VMAF/QualityTest)
const QUEUE_DEFS = [
    { key: 'Transcode', title: 'Transcode Queue', endpoint: '/api/TranscodeQueue/GetQueue?mode=Transcode', tableKind: 'tq' },
    { key: 'Remux',     title: 'Remux Queue',     endpoint: '/api/TranscodeQueue/GetQueue?mode=Remux',     tableKind: 'tq' },
    { key: 'Audio',     title: 'Audio Queue',     endpoint: '/api/TranscodeQueue/GetQueue?mode=AudioFix',  tableKind: 'tq' },
    { key: 'VMAF',      title: 'VMAF Queue',      endpoint: '/api/QualityTest/Queue',                     tableKind: 'qt' },
];

const ORDER_KEY = 'MvQueueOrder';
const COLLAPSED_KEY = 'MvQueueCollapsed';
const LoadOrder = () => {
    try {
        const stored = JSON.parse(localStorage.getItem(ORDER_KEY) || 'null');
        if (Array.isArray(stored) && stored.length === QUEUE_DEFS.length) {
            const knownKeys = new Set(QUEUE_DEFS.map(q => q.key));
            if (stored.every(k => knownKeys.has(k))) return stored;
        }
    } catch (e) {}
    return QUEUE_DEFS.map(q => q.key);
};
const SaveOrder = (order) => { try { localStorage.setItem(ORDER_KEY, JSON.stringify(order)); } catch (e) {} };
const LoadCollapsed = () => {
    try {
        const stored = JSON.parse(localStorage.getItem(COLLAPSED_KEY) || 'null');
        if (stored && typeof stored === 'object') return stored;
    } catch (e) {}
    return {};
};
const SaveCollapsed = (state) => { try { localStorage.setItem(COLLAPSED_KEY, JSON.stringify(state)); } catch (e) {} };

const InitTqTable = (Card, Def) => {
    const Cfg = new TableRendererConfig({ DefaultPageSize: 25, DefaultSortDirection: 'DESC' });
    const Bus = new EventBus();
    const Src = new ServerPagedDataSource(Def.endpoint, { Fetch: fetch.bind(window), RowsKey: 'Rows', TotalKey: 'TotalCount' });
    const Sort = new SortController(Src, Bus, Cfg);
    const Pag = new PaginationController(Src, Bus, Cfg);
    const Filt = new FilterController(Src, Bus, Cfg);
    Sort.SetSort('Priority', 'DESC');
    const Cols = [
        new ColumnDefinition({ Key: 'Id', Header: 'ID', CellRendererName: 'Text', Width: '70px' }),
        new ColumnDefinition({ Key: 'FileName', Header: 'File Name', CellRendererName: 'Text', Sortable: true }),
        new ColumnDefinition({ Key: 'Directory', Header: 'Directory', CellRendererName: 'Text' }),
        new ColumnDefinition({ Key: 'SizeMB', Header: 'Size', CellRendererName: 'Size', Sortable: true, Width: '90px' }),
        new ColumnDefinition({ Key: 'Priority', Header: 'Priority', CellRendererName: 'PriorityBadge', Sortable: true, Width: '90px' }),
        new ColumnDefinition({ Key: 'Status', Header: 'Status', CellRendererName: 'StatusBadge', Width: '100px' }),
        new ColumnDefinition({ Key: 'ClaimedBy', Header: 'Worker', CellRendererName: 'ClaimedBy', Width: '120px' }),
        new ColumnDefinition({ Key: 'DateAdded', Header: 'Date Added', CellRendererName: 'Date', Sortable: true, Width: '160px' }),
        new ColumnDefinition({ Key: '__Actions', Header: 'Actions', CellRendererName: 'TqActions', Width: '110px' })
    ];
    const Mount = Card.querySelector('.queue-table-mount');
    const T = new TableRenderer({ Container: Mount, DataSource: Src, Columns: Cols, Config: Cfg, Bus, Capabilities: { Sortable: true, Paginatable: true, Filterable: true, Virtualized: false }, SortController: Sort, PaginationController: Pag, FilterController: Filt });
    T._CellRegistry.Register('Text', TextR);
    T._CellRegistry.Register('Size', SizeR);
    T._CellRegistry.Register('Date', DateR);
    T._CellRegistry.Register('PriorityBadge', PriorityR);
    T._CellRegistry.Register('StatusBadge', StatusR);
    T._CellRegistry.Register('ClaimedBy', ClaimR);
    T._CellRegistry.Register('TqActions', TQActionsR);

    const InfoEl = Card.querySelector('.queue-pagination-info');
    const PrevBtn = Card.querySelector('.queue-prev-btn');
    const NextBtn = Card.querySelector('.queue-next-btn');
    const CountBadge = Card.querySelector('.queue-count-badge');
    const SummaryEl = Card.querySelector('.queue-summary');
    const Sync = () => {
        const P = Pag.GetPage(), Sz = Pag.GetPageSize(), Tot = Pag._TotalCount;
        InfoEl.textContent = PageInfo(Tot, P, Sz); CountBadge.textContent = `${Tot.toLocaleString()} items`;
        const Rows = (Src && Src.GetCurrentPageRows) ? Src.GetCurrentPageRows() : (Src._CurrentRows || []);
        let TotPage = 0, Running = 0, Pending = 0;
        Rows.forEach(R => { TotPage += parseFloat(R.SizeMB) || 0; if (R.Status === 'Running') Running++; else if (R.Status === 'Pending') Pending++; });
        const PageGB = TotPage / 1024;
        SummaryEl.textContent = Tot === 0 ? '— empty' : `(${Pending} pending, ${Running} running on page • ${PageGB.toFixed(1)} GB on page)`;
        PrevBtn.disabled = P <= 0; NextBtn.disabled = (P + 1) * Sz >= Tot;
    };
    PrevBtn.addEventListener('click', () => Pag.PrevPage());
    NextBtn.addEventListener('click', () => Pag.NextPage());
    Bus.Subscribe('PageChanged', Sync);
    Bus.Subscribe('SortChanged', () => Pag.GoTo(0));
    Bus.Subscribe('FilterChanged', () => Pag.GoTo(0));
    T.Render().then(Sync);
    return () => T.Refresh().then(Sync);
};

const InitQtTable = (Card, Def) => {
    const Cfg = new TableRendererConfig({ DefaultPageSize: 25, DefaultSortDirection: 'ASC' });
    const Bus = new EventBus();
    const Src = new ServerPagedDataSource(Def.endpoint, { Fetch: fetch.bind(window), RowsKey: 'Rows', TotalKey: 'TotalCount' });
    const Sort = new SortController(Src, Bus, Cfg);
    const Pag = new PaginationController(Src, Bus, Cfg);
    const Filt = new FilterController(Src, Bus, Cfg);
    Sort.SetSort('DateAdded', 'ASC');
    const Cols = [
        new ColumnDefinition({ Key: 'Id', Header: 'ID', CellRendererName: 'Text', Width: '70px' }),
        new ColumnDefinition({ Key: 'FileName', Header: 'File Name', CellRendererName: 'QtFile' }),
        new ColumnDefinition({ Key: 'Status', Header: 'Status', CellRendererName: 'QtStatus', Width: '100px' }),
        new ColumnDefinition({ Key: 'Priority', Header: 'Priority', CellRendererName: 'QtPri', Width: '90px' }),
        new ColumnDefinition({ Key: 'VMAFScore', Header: 'VMAF', CellRendererName: 'Vmaf', Width: '100px' }),
        new ColumnDefinition({ Key: '__Progress', Header: 'Progress', CellRendererName: 'QtProgress', Width: '140px' }),
        new ColumnDefinition({ Key: 'DateAdded', Header: 'Date Added', CellRendererName: 'Date', Sortable: true, Width: '160px' }),
        new ColumnDefinition({ Key: '__Actions', Header: 'Actions', CellRendererName: 'QtActions', Width: '90px' })
    ];
    const Mount = Card.querySelector('.queue-table-mount');
    const T = new TableRenderer({ Container: Mount, DataSource: Src, Columns: Cols, Config: Cfg, Bus, Capabilities: { Sortable: true, Paginatable: true, Filterable: false, Virtualized: false }, SortController: Sort, PaginationController: Pag, FilterController: Filt });
    T._CellRegistry.Register('Text', TextR);
    T._CellRegistry.Register('Date', DateR);
    T._CellRegistry.Register('QtFile', QtFileR);
    T._CellRegistry.Register('QtStatus', QtStatusR);
    T._CellRegistry.Register('QtPri', QtPriR);
    T._CellRegistry.Register('Vmaf', VmafR);
    T._CellRegistry.Register('QtProgress', QtProgressR);
    T._CellRegistry.Register('QtActions', QtActionsR);

    const InfoEl = Card.querySelector('.queue-pagination-info');
    const PrevBtn = Card.querySelector('.queue-prev-btn');
    const NextBtn = Card.querySelector('.queue-next-btn');
    const CountBadge = Card.querySelector('.queue-count-badge');
    const SummaryEl = Card.querySelector('.queue-summary');
    const Sync = () => {
        const P = Pag.GetPage(), Sz = Pag.GetPageSize(), Tot = Pag._TotalCount;
        InfoEl.textContent = PageInfo(Tot, P, Sz); CountBadge.textContent = `${Tot.toLocaleString()} items`;
        const Rows = (Src && Src.GetCurrentPageRows) ? Src.GetCurrentPageRows() : (Src._CurrentRows || []);
        let Running = 0, Pending = 0, Failed = 0;
        Rows.forEach(R => { if (R.Status === 'Running') Running++; else if (R.Status === 'Pending') Pending++; else if (R.Status === 'Failed') Failed++; });
        SummaryEl.textContent = Tot === 0 ? '— empty' : `(${Pending} pending, ${Running} running, ${Failed} failed on page)`;
        PrevBtn.disabled = P <= 0; NextBtn.disabled = (P + 1) * Sz >= Tot;
    };
    PrevBtn.addEventListener('click', () => Pag.PrevPage());
    NextBtn.addEventListener('click', () => Pag.NextPage());
    Bus.Subscribe('PageChanged', Sync);
    Bus.Subscribe('SortChanged', () => Pag.GoTo(0));
    T.Render().then(Sync);
    return () => T.Refresh().then(Sync);
};

const SetupDragReorder = (Host) => {
    let Dragging = null;
    Host.addEventListener('dragstart', (e) => {
        const Card = e.target.closest('.queue-card');
        if (!Card) return;
        Dragging = Card; Card.classList.add('dragging');
        try { e.dataTransfer.setData('text/plain', Card.dataset.key); e.dataTransfer.effectAllowed = 'move'; } catch (err) {}
    });
    Host.addEventListener('dragend', () => {
        if (Dragging) Dragging.classList.remove('dragging');
        Host.querySelectorAll('.queue-card').forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
        Dragging = null;
    });
    Host.addEventListener('dragover', (e) => {
        const Target = e.target.closest('.queue-card');
        if (!Target || Target === Dragging) return;
        e.preventDefault();
        const Rect = Target.getBoundingClientRect();
        const TopHalf = (e.clientY - Rect.top) < (Rect.height / 2);
        Host.querySelectorAll('.queue-card').forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
        Target.classList.add(TopHalf ? 'drag-over-top' : 'drag-over-bottom');
    });
    Host.addEventListener('drop', (e) => {
        e.preventDefault();
        const Target = e.target.closest('.queue-card');
        if (!Target || !Dragging || Target === Dragging) return;
        const Rect = Target.getBoundingClientRect();
        const TopHalf = (e.clientY - Rect.top) < (Rect.height / 2);
        Target.parentNode.insertBefore(Dragging, TopHalf ? Target : Target.nextSibling);
        const newOrder = Array.from(Host.querySelectorAll('.queue-card')).map(c => c.dataset.key);
        SaveOrder(newOrder);
    });
};

const BuildCards = () => {
    const Host = document.getElementById('QueueCardsHost');
    const Template = document.getElementById('QueueCardTemplate');
    const order = LoadOrder();
    const collapsed = LoadCollapsed();
    const orderedDefs = order.map(k => QUEUE_DEFS.find(q => q.key === k)).filter(Boolean);
    const refreshFns = [];
    orderedDefs.forEach(Def => {
        const Card = Template.content.firstElementChild.cloneNode(true);
        Card.dataset.key = Def.key;
        Card.querySelector('.queue-card-title').textContent = Def.title;
        if (collapsed[Def.key]) Card.classList.add('collapsed');
        const Toggle = Card.querySelector('.queue-collapse-toggle');
        Toggle.addEventListener('click', (e) => {
            e.stopPropagation();
            Card.classList.toggle('collapsed');
            const State = LoadCollapsed();
            State[Def.key] = Card.classList.contains('collapsed');
            SaveCollapsed(State);
        });
        Host.appendChild(Card);
        const Refresh = Def.tableKind === 'qt' ? InitQtTable(Card, Def) : InitTqTable(Card, Def);
        refreshFns.push(Refresh);
    });
    window.MvQueueRefreshFns = refreshFns;
    SetupDragReorder(Host);
};

window.addEventListener('DOMContentLoaded', BuildCards);
</script>
{% endblock %}
