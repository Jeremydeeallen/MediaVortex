<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="vortexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cameraGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  
  <!-- Vortex spiral -->
  <path d="M16,4 Q20,8 16,12 Q12,16 16,20 Q20,24 16,28" 
        stroke="url(#vortexGradient)" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Camera body -->
  <rect x="10" y="14" width="12" height="8" rx="2" fill="url(#cameraGradient)" stroke="#333" stroke-width="0.5"/>
  
  <!-- Camera lens -->
  <circle cx="16" cy="18" r="3" fill="#2c2c2c" stroke="#000" stroke-width="0.5"/>
  <circle cx="16" cy="18" r="2" fill="#1a1a1a"/>
  <circle cx="16" cy="18" r="1" fill="#4A90E2" opacity="0.8"/>
  
  <!-- Camera flash -->
  <rect x="20" y="12" width="2" height="2" rx="0.5" fill="#FFD700"/>
  
  <!-- Camera viewfinder -->
  <rect x="12" y="12" width="3" height="2" rx="0.5" fill="#2c2c2c"/>
  
  <!-- Vortex particles -->
  <circle cx="18" cy="8" r="1" fill="#4A90E2" opacity="0.7"/>
  <circle cx="14" cy="10" r="0.8" fill="#7B68EE" opacity="0.6"/>
  <circle cx="22" cy="14" r="0.6" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="10" cy="22" r="0.7" fill="#4A90E2" opacity="0.4"/>
  <circle cx="24" cy="20" r="0.5" fill="#7B68EE" opacity="0.3"/>
</svg>
