# Wakko (client-b450m-01, 10.0.0.230, bare-metal Linux Mint 22.3 Zena / Ubuntu 24.04 base)
# 4 workers on Ryzen 7 3700X (8C/16T). 4 threads per worker via cpuset.
# Intel Arc B580 (Battlemage) [8086:e20b] AV1 QSV via /dev/dri passthrough.
# Host packages required: intel-media-va-driver-non-free, libva2, libvpl2, libmfx-gen1.2 (Intel kobuk PPA, Ubuntu noble).
# Render group GID 992 + video group GID 44 mapped into container so worker (uid 0) can open /dev/dri/{renderD128,card1}.
x-worker: &worker-base
  image: mediavortex-worker:latest
  restart: unless-stopped
  stop_grace_period: 30m
  devices:
    - "/dev/dri:/dev/dri"
  group_add:
    - "992"
    - "44"
  environment:
    PYTHONUNBUFFERED: "1"
    MEDIAVORTEX_DB_HOST: "10.0.0.15"
    MEDIAVORTEX_DB_PORT: "5432"
    MEDIAVORTEX_DB_NAME: "mediavortex"
    MEDIAVORTEX_DB_USER: "mediavortex"
    MEDIAVORTEX_DB_PASSWORD: "mediavortex"
    MEDIAVORTEX_SHARE_MAPPINGS: "T=/mnt/media_tv/,M=/mnt/movies/,Z=/mnt/xxx/"
  volumes:
    - /mnt/media_tv:/mnt/media_tv
    - /mnt/movies:/mnt/movies
    - /mnt/xxx:/mnt/xxx

services:
  worker-1:
    <<: *worker-base
    hostname: wakko-worker-1
    cpuset: "0,1,2,3"
  worker-2:
    <<: *worker-base
    hostname: wakko-worker-2
    cpuset: "4,5,6,7"
  worker-3:
    <<: *worker-base
    hostname: wakko-worker-3
    cpuset: "8,9,10,11"
  worker-4:
    <<: *worker-base
    hostname: wakko-worker-4
    cpuset: "12,13,14,15"
