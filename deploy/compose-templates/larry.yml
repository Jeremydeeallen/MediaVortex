# Larry (mediavortex-workers LXC, CT 218 on Proxmox larry, 10.0.0.42)
# 4 workers on 32-thread CPU. 8 threads per worker via cpuset.
x-worker: &worker-base
  image: mediavortex-worker:latest
  restart: unless-stopped
  stop_grace_period: 30m
  environment:
    PYTHONUNBUFFERED: "1"
    MEDIAVORTEX_DB_HOST: "10.0.0.15"
    MEDIAVORTEX_DB_PORT: "5432"
    MEDIAVORTEX_DB_NAME: "mediavortex"
    MEDIAVORTEX_DB_USER: "mediavortex"
    MEDIAVORTEX_DB_PASSWORD: "mediavortex"
    MEDIAVORTEX_SHARE_MAPPINGS: "T=/mnt/media_tv/,M=/mnt/movies/,Z=/mnt/xxx/"
  volumes:
    - /mnt/media_tv:/mnt/media_tv
    - /mnt/movies:/mnt/movies
    - /mnt/xxx:/mnt/xxx

services:
  worker-1:
    <<: *worker-base
    hostname: larry-worker-1
    cpuset: "0-7"
  worker-2:
    <<: *worker-base
    hostname: larry-worker-2
    cpuset: "8-15"
  worker-3:
    <<: *worker-base
    hostname: larry-worker-3
    cpuset: "16-23"
  worker-4:
    <<: *worker-base
    hostname: larry-worker-4
    cpuset: "24-31"
