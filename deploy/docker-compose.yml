# MediaVortex TranscodeService Worker Pool
#
# Build:  docker compose -f deploy/docker-compose.yml build
# Run:    docker compose -f deploy/docker-compose.yml up -d
# Scale:  docker compose -f deploy/docker-compose.yml up -d --scale worker=4
#
# For production deployment on the worker-pool LXC (10.0.0.42),
# the pre-built image is transferred via `docker save | ssh ... docker load`
# and the LXC's own /opt/mediavortex/docker-compose.yml is used instead.

services:
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mediavortex-worker:latest
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "8"
          memory: 8G
    environment:
      MEDIAVORTEX_DB_HOST: "${MEDIAVORTEX_DB_HOST:-10.0.0.15}"
      MEDIAVORTEX_DB_PORT: "${MEDIAVORTEX_DB_PORT:-5432}"
      MEDIAVORTEX_DB_NAME: "${MEDIAVORTEX_DB_NAME:-mediavortex}"
      MEDIAVORTEX_DB_USER: "${MEDIAVORTEX_DB_USER:-mediavortex}"
      MEDIAVORTEX_DB_PASSWORD: "${MEDIAVORTEX_DB_PASSWORD:-mediavortex}"
      MEDIAVORTEX_SHARE_MAPPINGS: "${MEDIAVORTEX_SHARE_MAPPINGS:-T=/mnt/media_tv/,M=/mnt/movies/,Z=/mnt/xxx/}"
    volumes:
      - /mnt/media_tv:/mnt/media_tv
      - /mnt/movies:/mnt/movies
      - /mnt/xxx:/mnt/xxx
