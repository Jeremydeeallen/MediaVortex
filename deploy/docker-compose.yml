# MediaVortex Worker Pool
#
# Set MEDIAVORTEX_WORKER_PREFIX in .env or shell before running:
#   MEDIAVORTEX_WORKER_PREFIX=larry-worker  docker compose up -d              # all 8
#   MEDIAVORTEX_WORKER_PREFIX=wakko-worker  docker compose up -d worker-1 worker-2 worker-3 worker-4
#
# Build:  docker compose build

x-worker: &worker-base
  image: mediavortex-worker:latest
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "8"
        memory: 8G
  environment: &worker-env
    MEDIAVORTEX_DB_HOST: "${MEDIAVORTEX_DB_HOST:-10.0.0.15}"
    MEDIAVORTEX_DB_PORT: "${MEDIAVORTEX_DB_PORT:-5432}"
    MEDIAVORTEX_DB_NAME: "${MEDIAVORTEX_DB_NAME:-mediavortex}"
    MEDIAVORTEX_DB_USER: "${MEDIAVORTEX_DB_USER:-mediavortex}"
    MEDIAVORTEX_DB_PASSWORD: "${MEDIAVORTEX_DB_PASSWORD:-mediavortex}"
    MEDIAVORTEX_SHARE_MAPPINGS: "${MEDIAVORTEX_SHARE_MAPPINGS:-T=/mnt/media_tv/,M=/mnt/movies/,Z=/mnt/xxx/}"
  volumes: &worker-volumes
    - /mnt/media_tv:/mnt/media_tv
    - /mnt/movies:/mnt/movies
    - /mnt/xxx:/mnt/xxx
    - /staging:/staging

services:
  build:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mediavortex-worker:latest
    profiles: ["build"]
    command: ["echo", "build-only"]

  worker-1:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-1"

  worker-2:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-2"

  worker-3:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-3"

  worker-4:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-4"

  worker-5:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-5"

  worker-6:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-6"

  worker-7:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-7"

  worker-8:
    <<: *worker-base
    hostname: "${MEDIAVORTEX_WORKER_PREFIX:-worker}-8"
